<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Text Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useRef } = React;
        const { motion, useScroll, useTransform } = Motion;

        // --- MagicText Component ---
        const Word = ({ children, progress, range }) => {
            const opacity = useTransform(progress, range, [0, 1]);

            return (
                <span className="relative mt-[8px] sm:mt-[12px] mr-1 sm:mr-2 text-xl sm:text-2xl md:text-4xl font-bold inline-block">
                    <span className="absolute opacity-10">{children}</span>
                    <motion.span style={{ opacity: opacity }}>
                        {children}
                    </motion.span>
                </span>
            );
        };

        const MagicText = ({ text }) => {
            const container = useRef(null);
            const { scrollYProgress } = useScroll({
                target: container,
                offset: ["start 0.8", "start 0.25"],
            });

            const words = text.split(" ");

            return (
                <p ref={container} className="flex flex-wrap justify-center leading-tight p-8 max-w-4xl mx-auto">
                    {words.map((word, i) => {
                        const start = i / words.length;
                        const end = start + 1 / words.length;
                        return (
                            <Word key={i} progress={scrollYProgress} range={[start, end]}>
                                {word}
                            </Word>
                        );
                    })}
                </p>
            );
        };

        // --- Demo Component ---
        const Demo = () => {
            return (
                <main className="relative">
                    {/* Initial Hero Section */}
                    <div className="h-screen flex flex-col items-center justify-center">
                        <h1 className="text-xl text-zinc-500 animate-bounce">Scroll Down 👇</h1>
                    </div>

                    {/* Component Integration */}
                    <div className="relative flex items-center justify-center min-h-screen py-[20vh]">
                        <MagicText 
                            text="Hi there! I'm preet, creator of HextaUI. Thank you so much for all the support and love you've shown me. I hope you enjoy using HextaUI as much as I enjoyed creating it." 
                        />
                    </div>

                    {/* Footer Spacer */}
                    <div className="h-screen flex items-center justify-center">
                        <p className="text-zinc-600">End of Demo</p>
                    </div>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Demo />);
    </script>
</body>
</html>
