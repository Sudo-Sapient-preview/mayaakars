<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mayaakars| Minimalist Menu</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CustomEase.min.js"></script>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&display=swap");

        :root {
            --base-100: #000;
            --base-200: #e8dfdf;
            --base-300: #e5e3d9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Instrument Sans", sans-serif;
            background: #000;
            color: var(--base-100);
            overflow: hidden;
            min-height: 100dvh;
        }

        a,
        p {
            text-decoration: none;
            color: var(--base-100);
            font-weight: 450;
            line-height: 1;
        }

        /* Simplified Navigation */
        nav {
            position: fixed;
            width: 100%;
            padding: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .nav-left,
        .nav-center,
        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-left {
            flex: 1;
            justify-content: flex-start;
        }

        .nav-center {
            flex: 1;
            justify-content: center;
        }

        .nav-right {
            flex: 1;
            justify-content: flex-end;
        }

        .nav-left a,
        .nav-center a,
        .nav-right a {
            display: flex;
            align-items: center;
            text-transform: uppercase;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: opacity 0.3s ease;
            color: #fff;
        }

        .nav-left a:hover,
        .nav-center a:hover,
        .nav-right a:hover {
            opacity: 0.7;
        }

        body:has(.menu.active) .nav-left a,
        body:has(.menu.active) .nav-center a,
        body:has(.menu.active) .nav-right a {
            color: #000;
        }

        /* Hero Section (Empty) */
        .hero {
            position: relative;
            width: 100%;
            height: 100dvh;
            background: #000;
        }

        /* Menu Overlay */
        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            pointer-events: none;
            overflow: hidden;
            z-index: 5;
        }

        .menu.active {
            pointer-events: all;
        }

        .menu-bg {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .menu-bg-left,
        .menu-bg-right {
            position: absolute;
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        .menu-bg-left {
            left: 0;
        }

        .menu-bg-right {
            right: 0;
        }

        .menu-bg-left-inner,
        .menu-bg-right-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            will-change: transform;
        }

        .menu-bg-left-inner {
            background-color: var(--base-200);
            transform-origin: 100% 50%;
            transform: rotate(180deg) scale(2, 2);
        }

        .menu-bg-right-inner {
            background-color: var(--base-300);
            transform-origin: 0% 50%;
            transform: rotate(-180deg) scale(2, 2);
        }

        .menu-items {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 6;
            gap: clamp(1rem, 2vw, 2rem);
            padding: max(4rem, env(safe-area-inset-top)) clamp(1.25rem, 4vw, 2.25rem) max(4rem, env(safe-area-inset-bottom));
        }

        .menu-items-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .menu-link {
            overflow: hidden;
        }

        .line {
            display: block;
            transform: translateY(110%);
            will-change: transform;
        }

        .menu-items-col:nth-child(1) a {
            text-transform: uppercase;
            font-size: clamp(1.3rem, 2.4vw, 4rem);
        }

        .menu-items-col:nth-child(2) a {
            font-family: "Instrument Serif", serif;
            font-size: clamp(1.35rem, 2.7vw, 3rem);
        }

        .menu-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1.4rem clamp(1.25rem, 4vw, 2rem);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .menu-footer-col {
            display: flex;
            gap: 2rem;
        }

        .menu-footer a,
        .menu-footer p {
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        @media (max-width: 1000px) {
            .menu-bg-right {
                display: none;
            }

            .menu-bg-left {
                width: 100%;
            }

            .menu-items {
                padding: max(5rem, env(safe-area-inset-top)) 1.25rem max(4.5rem, env(safe-area-inset-bottom));
                flex-direction: column-reverse;
                gap: 2.5rem;
                overflow-y: auto;
            }

            .menu-items-col {
                align-items: flex-start;
                gap: 0.5rem;
            }

            .menu-footer-col {
                flex-direction: column;
                gap: 0;
            }

            .menu-footer {
                position: static;
                padding: 0;
                margin-top: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            nav {
                padding: 1.5rem;
            }

            .menu-items {
                padding: max(4.5rem, env(safe-area-inset-top)) 1rem max(2rem, env(safe-area-inset-bottom));
                gap: 2rem;
            }

            .menu-items-col:nth-child(1) a {
                font-size: clamp(1.2rem, 5vw, 2rem);
            }

            .menu-items-col:nth-child(2) a {
                font-size: clamp(1.3rem, 5vw, 2rem);
            }

            .menu-footer {
                padding: 0;
            }
        }

        @media (max-height: 720px) {
            .menu-items-col {
                gap: 0.35rem;
            }

            .menu-items-col:nth-child(1) a,
            .menu-items-col:nth-child(2) a {
                font-size: clamp(1.05rem, 4.4vh, 1.8rem);
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-left">
        </div>
        <div class="nav-center">
            <a href="/">Mayaakars</a>
        </div>
        <div class="nav-right">
            <a id="menu-trigger">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" y1="12" x2="20" y2="12"></line>
                    <line x1="4" y1="6" x2="20" y2="6"></line>
                    <line x1="4" y1="18" x2="20" y2="18"></line>
                </svg>
            </a>
        </div>
    </nav>

    <div class="menu">
        <div class="menu-bg">
            <div class="menu-bg-left">
                <div class="menu-bg-left-inner"></div>
            </div>
            <div class="menu-bg-right">
                <div class="menu-bg-right-inner"></div>
            </div>
        </div>
        <div class="menu-items">
            <div class="menu-items-col">
                <div class="menu-link"><a href="#"><span class="line">Manifesto</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Spatial Journeys</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Material Archive</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Visit Atelier</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Rituals</span></a></div>
            </div>
            <div class="menu-items-col">
                <div class="menu-link"><a href="#"><span class="line">Tactile Vault</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Form Experiments</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Carbon Network</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Shadow Library</span></a></div>
                <div class="menu-link"><a href="#"><span class="line">Collections</span></a></div>
            </div>
            <div class="menu-footer">
                <div class="menu-footer-col">
                    <div class="menu-link"><a href="#"><span class="line">Usage Terms</span></a></div>
                    <div class="menu-link"><a href="#"><span class="line">Data & Cookies</span></a></div>
                </div>
                <div class="menu-footer-col">
                    <div class="menu-link">
                        <p><span class="line">&copy; 2025 Mayaakars</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="hero"></section>

    <script>
        gsap.registerPlugin(CustomEase);
        CustomEase.create("hop", "0.85, 0, 0.15, 1");

        const menu = document.querySelector(".menu");
        const menuTrigger = document.querySelector("#menu-trigger");
        let isMenuOpen = false;

        const tl = gsap.timeline({ paused: true });

        // Animation Timeline
        tl.to(".menu-bg-left-inner", { rotate: 0, duration: 1.2, ease: "hop" }, 0)
            .to(".menu-bg-right-inner", { rotate: 0, duration: 1.2, ease: "hop" }, 0)
            .to(".menu-items-col:nth-child(1) .line", { y: 0, duration: 0.8, ease: "power3.out", stagger: 0.05 }, 0.6)
            .to(".menu-items-col:nth-child(2) .line", { y: 0, duration: 0.8, ease: "power3.out", stagger: 0.05 }, "<")
            .to(".menu-footer .line", { y: 0, duration: 0.8, ease: "power3.out", stagger: 0.05 }, "<");

        menuTrigger.addEventListener("click", () => {
            if (isMenuOpen) {
                tl.reverse();
                menu.classList.remove("active");
            } else {
                menu.classList.add("active");
                tl.play();
            }
            isMenuOpen = !isMenuOpen;
        });
    </script>
</body>

</html>
