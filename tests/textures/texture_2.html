<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LACE | Premium Interior Grid</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080808; /* Rich deep black */
        }

        canvas {
            display: block;
        }

        .brand-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .brand-layer h1 {
            color: #FFFFFF;
            font-family: 'serif';
            font-weight: 200;
            font-size: 3.5rem;
            letter-spacing: 30px;
            text-transform: uppercase;
            margin: 0;
            opacity: 0.8;
        }

        /* Gold Corner SVG */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            stroke: #D4AF37; /* Gold */
            stroke-width: 0.5;
            fill: none;
            opacity: 0.6;
        }
        .top-left { top: 50px; left: 50px; }
    </style>
</head>
<body>

    <svg class="corner top-left" viewBox="0 0 100 100">
        <path d="M 0 100 V 0 H 100" />
    </svg>

    <div class="brand-layer">
        <h1>LACE</h1>
    </div>

    <canvas id="gridCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');

        let points = [];
        const spacing = 100; // Size of the grid squares
        let time = 0;
        const mouse = { x: -1000, y: -1000 };

        function init() {
            resize();
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            points = [];
            const cols = Math.ceil(canvas.width / spacing) + 1;
            const rows = Math.ceil(canvas.height / spacing) + 1;

            for (let i = 0; i < cols; i++) {
                points[i] = [];
                for (let j = 0; j < rows; j++) {
                    points[i][j] = {
                        x: i * spacing,
                        y: j * spacing,
                        baseX: i * spacing,
                        baseY: j * spacing
                    };
                }
            }
        }

        function animate() {
            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cols = points.length;
            const rows = points[0].length;

            // Update Point Positions
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const p = points[i][j];
                    
                    // Slow wave movement
                    const waveX = Math.sin(time + (i * 0.3)) * 8;
                    const waveY = Math.cos(time + (j * 0.3)) * 8;

                    // Interaction with mouse
                    const dx = mouse.x - p.baseX;
                    const dy = mouse.y - p.baseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const force = Math.max(0, (250 - dist) / 250);

                    p.x = p.baseX + waveX + (dx * force * 0.2);
                    p.y = p.baseY + waveY + (dy * force * 0.2);
                }
            }

            // Draw the actual Grid Lines
            ctx.lineWidth = 0.4; // Ultra thin for premium feel

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const p = points[i][j];

                    // Horizontal Line
                    if (i < cols - 1) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(points[i+1][j].x, points[i+1][j].y);
                        ctx.strokeStyle = `rgba(255, 255, 255, 0.15)`;
                        ctx.stroke();
                    }

                    // Vertical Line
                    if (j < rows - 1) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(points[i][j+1].x, points[i][j+1].y);
                        ctx.strokeStyle = `rgba(255, 255, 255, 0.15)`;
                        ctx.stroke();
                    }

                    // Draw Gold Nodes at intersections
                    if ((i + j) % 4 === 0) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = '#D4AF37'; // Gold
                        ctx.fill();
                    }
                }
            }

            time += 0.015; // Slow, elegant speed
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('resize', resize);
        init();
    </script>
</body>
</html>
