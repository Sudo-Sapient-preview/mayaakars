<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Interior Concept</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505; /* Deep, premium off-black */
        }

        canvas {
            display: block;
            filter: blur(0.4px); /* Softens the digital edge for a more "printed" look */
        }

        /* Branding Overlay */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #D4AF37; 
            font-family: 'Times New Roman', serif;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .overlay h1 {
            font-weight: 300;
            font-size: 2.5rem;
            letter-spacing: 15px;
            margin: 0;
            text-transform: uppercase;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>Lace</h1>
    </div>
    
    <canvas id="textureCanvas"></canvas>

    <script>
        const canvas = document.getElementById('textureCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const spacing = 45; // Wider spacing for a "light" airy feel
        let time = 0;

        // Configuration
        const GOLD = "212, 175, 55";   // RGB for Gold
        const WHITE = "255, 255, 255"; // RGB for White

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cols = Math.ceil(canvas.width / spacing) + 2;
            const rows = Math.ceil(canvas.height / spacing) + 2;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    
                    // SLOW MOTION LOGIC
                    // We use very small increments (0.002) for that premium "barely moving" feel
                    const moveX = Math.sin(time * 0.9 + (i * 0.5) + (j * 0.5)) * 12;
                    const moveY = Math.cos(time * 0.9 + (i * 0.5) + (j * 0.5)) * 12;

                    const x = i * spacing + moveX;
                    const y = j * spacing + moveY;

                    // OPACITY FADE (Pulse)
                    // This creates the "shimmer" effect from your video
                    const alpha = (Math.sin(time * 0.5 + (i + j) * 0.3) + 1) / 2;
                    const finalAlpha = 0.1 + (alpha * 0.3); // Kept very low for "lightness"

                    ctx.beginPath();
                    ctx.arc(x, y, 0.7, 0, Math.PI * 2);

                    // Color distribution: mostly white, occasional gold
                    if ((i + j) % 7 === 0) {
                        ctx.fillStyle = `rgba(${GOLD}, ${finalAlpha + 0.2})`;
                    } else {
                        ctx.fillStyle = `rgba(${WHITE}, ${finalAlpha})`;
                    }

                    ctx.fill();
                }
            }

            time += 0.005; // Extremely slow speed for elegance
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
