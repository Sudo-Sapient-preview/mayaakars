<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayaakars | Journal Entry</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Geist:wght@300;400;500;600&display=swap');

        :root {
            --bg: #050505;
            --gold: #c8a95c;
            --text: #f2f2f2;
            --muted: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Geist', sans-serif;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Nav (simple placeholder map back to main) */
        nav {
            padding: 30px 40px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* Hero Header Section */
        .article-hero {
            position: relative;
            width: 100%;
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 10%;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.4);
        }

        /* Gradient overlay to make text readable */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 0%, transparent 60%);
            z-index: -1;
        }

        .category-badge {
            color: var(--gold);
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .article-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 400;
            line-height: 1.1;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .article-meta {
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* Content Area */
        .article-body {
            max-width: 760px;
            margin: 60px auto 120px;
            padding: 0 30px;
        }

        .summary-block {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            line-height: 1.5;
            color: var(--gold);
            margin-bottom: 50px;
            font-style: italic;
        }

        .content p {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.85);
        }

        .content h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            margin: 50px 0 20px;
            color: #fff;
        }

        /* Error state */
        .error-state {
            display: none;
            height: 80vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        .error-state h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .article-hero {
                height: 60vh;
                padding: 30px 20px;
            }

            .article-body {
                margin: 40px auto 80px;
            }

            .summary-block {
                font-size: 1.35rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="blog.html">← Back to Journal</a>
        <a href="journal_all.html">Browse All</a>
    </nav>

    <!-- Normal Article Content -->
    <main id="article-container" style="display: none;">
        <header class="article-hero">
            <img src="" alt="Hero Image" class="hero-bg" id="hero-image">
            <div class="hero-overlay"></div>

            <div class="category-badge" id="category-badge">Category</div>
            <h1 class="article-title" id="article-title">Article Title</h1>
            <div class="article-meta" id="article-date">Date</div>
        </header>

        <article class="article-body">
            <div class="summary-block" id="article-summary">
                Summary goes here.
            </div>

            <div class="content" id="article-content">
                <!-- Content injected here -->
            </div>
        </article>
    </main>

    <!-- Error State -->
    <div class="error-state" id="error-container">
        <h1>Article Not Found</h1>
        <p style="color: var(--muted); margin-bottom: 30px;">The journal entry you are looking for does not exist.</p>
        <a href="blog.html"
            style="color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); padding-bottom: 5px;">Return
            to Journal</a>
    </div>

    <!-- Import our custom JS data -->
    <script src="blog_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get the article ID from the URL (e.g. article_template.html?id=spatial-harmony)
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            const article = getArticleById(articleId);

            if (article) {
                // We found the article in blog_data.js! Let's fill the page.
                document.title = `${article.title} | Mayaakars Journal`;

                document.getElementById('hero-image').src = article.image;
                document.getElementById('category-badge').textContent = article.category;
                document.getElementById('article-title').textContent = article.title;
                document.getElementById('article-date').textContent = article.date;
                document.getElementById('article-summary').textContent = article.summary;
                document.getElementById('article-content').innerHTML = article.content;

                // Show the article container
                document.getElementById('article-container').style.display = 'block';
            } else {
                // Invalid ID or no ID provided
                document.title = "Article Not Found | Mayaakars";
                document.getElementById('error-container').style.display = 'flex';
            }
        });
    </script>
</body>

</html>
