<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayaakars | All Journal Entries</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Geist:wght@300;400;500;600&display=swap');

        :root {
            --bg: #050505;
            --gold: #c8a95c;
            --text: #f2f2f2;
            --muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Geist', sans-serif;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Nav */
        nav {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* Header */
        header {
            text-align: center;
            padding: 10vh 20px 8vh;
        }

        .header-label {
            font-size: 0.75rem;
            letter-spacing: 4px;
            margin-bottom: 25px;
            display: block;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
        }

        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Grid */
        .journal-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }

        .journal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        .article-card {
            text-decoration: none;
            color: var(--text);
            display: block;
            group: card;
        }

        .image-wrapper {
            position: relative;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
            transition: transform 0.8s ease, filter 0.8s ease;
        }

        .article-card:hover .image-wrapper img {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: var(--gold);
        }

        .card-date {
            color: var(--muted);
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 10px;
            transition: color 0.4s ease;
        }

        .article-card:hover .card-title {
            color: var(--gold);
        }

        .card-summary {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <nav>
        <a href="blog.html">← Featured Journal</a>
    </nav>

    <header>
        <span class="header-label">Archive</span>
        <h1>All Articles</h1>
    </header>

    <main class="journal-container">
        <div class="journal-grid" id="journal-grid">
            <!-- JavaScript will inject cards here -->
        </div>
    </main>

    <script src="blog_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('journal-grid');

            // Generate HTML for each post in blog_data.js
            blogData.forEach(article => {
                const card = document.createElement('a');
                card.href = `article_template.html?id=${article.id}`;
                card.className = 'article-card';

                card.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${article.image}" alt="${article.title}">
                    </div>
                    <div class="card-meta">
                        <span>${article.category}</span>
                        <span class="card-date">${article.date}</span>
                    </div>
                    <h2 class="card-title">${article.title}</h2>
                    <p class="card-summary">${article.summary}</p>
                `;

                grid.appendChild(card);
            });
        });
    </script>
</body>

</html>
