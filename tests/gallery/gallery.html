<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Ultra Smooth Spatial Grid</title>
    <!-- GSAP Animation Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Geist:wght@300;400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #C49A3A;
            --bg-dark: #050505;
            --text-light: #E3E4E0;
        }

        /* === CORE SCENE SETUP === */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Geist', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            perspective: 2000px;
            overflow: hidden;
        }

        /* === TYPOGRAPHY === */
        #title-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            z-index: 1;
            /* Sits behind the images */
            text-align: center;
        }

        #title {
            position: absolute;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(4rem, 8vw, 10rem);
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.05em;
            color: var(--text-light);
            pointer-events: none;
            margin: 0;
            white-space: nowrap;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        /* === 3D WRAPPERS === */
        #zoom-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-origin: center center;
            transform-style: preserve-3d;
            z-index: 5;
        }

        #scene-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
        }

        #drag-container {
            position: absolute;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            cursor: grab;
        }

        #drag-container:active {
            cursor: grabbing;
        }

        /* === IMAGE GRID ITEMS === */
        .grid-item {
            position: absolute;
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            will-change: transform, opacity;
            pointer-events: auto;
            -webkit-user-drag: none;
            transition: box-shadow 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
            background-color: #111;
            color: transparent;
            border-radius: 4px;
            filter: brightness(0.6) contrast(1.1) grayscale(0.2);
        }

        .grid-item:hover {
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            transform: scale(1.03);
            z-index: 100;
            filter: brightness(1) contrast(1.05) grayscale(0);
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            #title {
                font-size: 12vw;
            }
        }

        @media (max-width: 480px) {
            #title {
                font-size: 14vw;
            }
        }
    </style>
</head>

<body>

    <div id="viewport">
        <div id="title-container">
            <h1 id="title">Selected Works</h1>
        </div>

        <!-- Zoom Wrapper holds everything -->
        <div id="zoom-wrapper">
            <div id="scene-wrapper">
                <div id="drag-container"></div>
            </div>
        </div>
    </div>

    <script>
        const dragContainer = document.getElementById("drag-container");
        const zoomWrapper = document.getElementById("zoom-wrapper");

        // 1. VIRTUAL GRID SETUP
        const isMobile = window.innerWidth <= 768;
        // Restoring more density to mobile so it doesn't just show 15 images
        const numCols = isMobile ? 5 : 7;
        const numRows = isMobile ? 6 : 5;

        // Scale cell sizes dynamically for mobile so they aren't clustered
        const baseSize = isMobile ? window.innerWidth * 0.4 : 320;
        const cellW = baseSize;
        const cellH = baseSize;

        const gridW = numCols * cellW;
        const gridH = numRows * cellH;

        dragContainer.style.width = `${gridW}px`;
        dragContainer.style.height = `${gridH}px`;

        // Curated elegant architecture/interiors imagery
        const images = [
            "1497366216548-37526070297c", "1618221195710-dd6b41faaea6", "1600585154340-be6161a56a0c",
            "1502672260266-1c1ef2d93688", "1513519247388-193ad51ae207", "1449844908441-8829872d2607",
            "1503694978374-8b206f366050", "1486406146926-c627a92ad1ab", "1480074568708-e7b220eb0480",
            "1431538510849-b719825bf08b", "1486304873000-235643847519", "1513694203232-719a280e022f",
            "1470723710355-95304d8aece4", "1506506082216-9baf93ab363e", "1490215096531-2fbff99c54e1"
        ];

        // Mobile sizes are scaled proportionally
        const mScale = isMobile ? 0.6 : 1;
        const sizePresets = [
            { w: 160 * mScale, h: 220 * mScale }, { w: 240 * mScale, h: 150 * mScale },
            { w: 140 * mScale, h: 260 * mScale }, { w: 180 * mScale, h: 180 * mScale },
            { w: 110 * mScale, h: 140 * mScale }, { w: 260 * mScale, h: 320 * mScale }
        ];

        const gridItems = [];

        // 2. BUILD THE SCATTERED GRID
        for (let i = 0; i < numCols * numRows; i++) {
            const r = Math.floor(i / numCols);
            const c = i % numCols;

            const img = document.createElement("img");
            const imgId = images[i % images.length];
            img.src = `https://images.unsplash.com/photo-${imgId}?auto=format&fit=crop&w=500&q=80`;
            img.classList.add("grid-item");

            const preset = sizePresets[Math.floor(Math.random() * sizePresets.length)];
            img.style.width = `${preset.w}px`;
            img.style.height = `${preset.h}px`;

            const offsetX = (Math.random() - 0.5) * (80 * mScale);
            const offsetY = (Math.random() - 0.5) * (80 * mScale);

            const leftPos = (c * cellW) + (cellW / 2) - (preset.w / 2) + offsetX;
            const topPos = (r * cellH) + (cellH / 2) - (preset.h / 2) + offsetY;

            img.style.left = `${leftPos}px`;
            img.style.top = `${topPos}px`;

            dragContainer.appendChild(img);
            gridItems.push(img);
        }

        // 3. THE FLUID "GLIDING" ANIMATION
        let introFinished = false;

        const tl = gsap.timeline({
            onComplete: () => {
                introFinished = true;
                requestAnimationFrame(renderLoop);
            }
        });

        tl.fromTo("#title-container",
            { z: -3000, opacity: 0 },
            { z: -800, opacity: 0.9, duration: 4, ease: "power3.out" }
        );

        // Keeping the aggressive deep space fly-in exactly as requested
        gsap.set(gridItems, {
            z: () => -3000 - Math.random() * 2000,
            opacity: 0
        });

        tl.to(gridItems, {
            z: 0,
            opacity: 1,
            duration: 4.5,
            ease: "power3.out",
            stagger: { amount: 2, from: "center" }
        }, "-=3.5");


        // 4. SUBTLE MOUSE PARALLAX
        const sceneWrapper = document.getElementById("scene-wrapper");
        window.addEventListener("mousemove", (e) => {
            if (!introFinished || isMobile) return; // Disable parallax on mobile
            const xStr = (e.clientX / window.innerWidth - 0.5) * 2;
            const yStr = (e.clientY / window.innerHeight - 0.5) * 2;

            gsap.to(sceneWrapper, {
                rotationY: xStr * 3,
                rotationX: -yStr * 3,
                duration: 2,
                ease: "power2.out"
            });

            gsap.to("#title-container", {
                x: -xStr * 60,
                y: -yStr * 60,
                duration: 2,
                ease: "power2.out"
            });
        });


        // 5. BUTTERY ZOOM & DRAG PHYSICS ENGINE
        let currentX = window.innerWidth / 2 - gridW / 2;
        let currentY = window.innerHeight / 2 - gridH / 2;
        let targetX = currentX;
        let targetY = currentY;

        let currentScale = 1;
        let targetScale = 1;

        dragContainer.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;

        let isDragging = false;
        let startMouseX, startMouseY;
        let initialTargetX, initialTargetY;

        // Dynamic boundaries that respond gracefully, specifically fixing mobile bounds
        const getLimits = () => {
            const paddingX = window.innerWidth * 0.3; // Allow dragging 30% past edge
            const paddingY = window.innerHeight * 0.3;
            return {
                minX: Math.min(0, window.innerWidth - gridW - paddingX),
                maxX: paddingX,
                minY: Math.min(0, window.innerHeight - gridH - paddingY),
                maxY: paddingY
            };
        };

        const handleDown = (x, y) => {
            if (!introFinished) return;
            isDragging = true;
            startMouseX = x;
            startMouseY = y;
            initialTargetX = targetX;
            initialTargetY = targetY;
            document.body.style.cursor = "grabbing";
        };

        const handleMove = (x, y) => {
            if (!isDragging) return;
            // On mobile, friction/zoom multiplier needs adjusting so touch isn't erratic
            const zoomMultiplier = isMobile ? (1.5 / targetScale) : (1 / targetScale);
            const dx = (x - startMouseX) * zoomMultiplier;
            const dy = (y - startMouseY) * zoomMultiplier;

            const limits = getLimits();
            targetX = Math.max(limits.minX, Math.min(initialTargetX + dx * 1.5, limits.maxX));
            targetY = Math.max(limits.minY, Math.min(initialTargetY + dy * 1.5, limits.maxY));
        };

        const handleUp = () => {
            isDragging = false;
            document.body.style.cursor = "default";
        };

        // Scroll Wheel for Zooming
        window.addEventListener("wheel", (e) => {
            if (!introFinished) return;
            const zoomSensitivity = 0.0015;
            targetScale -= e.deltaY * zoomSensitivity;
            // Allowed to zoom out a little more (0.5) to see the grid better
            targetScale = Math.max(0.5, Math.min(targetScale, 3));
        }, { passive: true });

        // Mouse Events
        window.addEventListener("mousedown", (e) => handleDown(e.clientX, e.clientY));
        window.addEventListener("mousemove", (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", handleUp);
        window.addEventListener("mouseleave", handleUp);

        // Touch Events
        window.addEventListener("touchstart", (e) => handleDown(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        window.addEventListener("touchmove", (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        window.addEventListener("touchend", handleUp);

        // Smooth Physics Loop
        function renderLoop() {
            currentX += (targetX - currentX) * 0.05;
            currentY += (targetY - currentY) * 0.05;
            dragContainer.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;

            currentScale += (targetScale - currentScale) * 0.05;
            zoomWrapper.style.transform = `scale(${currentScale})`;

            requestAnimationFrame(renderLoop);
        }
    </script>
</body>

</html>
