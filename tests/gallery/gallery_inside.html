<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudo Sapient | Seamless Parallax</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg-dark: #0a0a0a;
            --section-height: 100dvh; /* Full screen height for seamless flow */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            min-height: 100dvh;
        }

        .scroll-wrapper {
            width: 100%;
        }

        .section {
            position: relative;
            width: 100%;
            height: var(--section-height);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0; /* REMOVED: No more gaps between sections */
            overflow: hidden;
        }

        .img-container {
            width: 100%; /* CHANGED: Full width for seamless edge-to-edge */
            height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .section img {
            width: 100%;
            height: 140%; /* Extra height to accommodate the parallax travel */
            object-fit: cover;
            filter: brightness(0.4);
            position: absolute;
            top: 0;
            left: 0;
        }

        .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 0 clamp(14px, 4vw, 40px);
            pointer-events: none;
        }

        .text-overlay h2 {
            font-size: clamp(2.5rem, 10vw, 6rem);
            text-transform: uppercase;
            letter-spacing: clamp(2px, 1.7vw, 15px);
            margin: 0;
            font-weight: 800;
            line-height: 1;
            text-wrap: balance;
        }

        .text-overlay p {
            font-size: clamp(0.75rem, 1.4vw, 1rem);
            letter-spacing: clamp(1.5px, 0.9vw, 6px);
            text-transform: uppercase;
            opacity: 0.9;
            margin-top: 20px;
        }

        .footer-spacer {
            height: 20vh;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            .text-overlay h2 {
                font-size: clamp(1.7rem, 9vw, 3.5rem);
            }

            .text-overlay p {
                font-size: 0.8rem;
                letter-spacing: 3px;
            }

            .section {
                height: 72dvh;
            }

            .section img {
                height: 130%;
            }
        }

        @media (max-width: 480px) {
            .text-overlay h2 {
                letter-spacing: 2px;
            }

            .text-overlay p {
                font-size: 0.7rem;
                letter-spacing: 2px;
                margin-top: 12px;
            }

            .section {
                height: 62dvh;
            }

            .footer-spacer {
                height: 10vh;
            }
        }
    </style>
</head>
<body>

    <div class="scroll-wrapper">
        <section class="section">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2000" class="parallax-img">
                <div class="text-overlay">
                    <h2>The Beginning</h2>
                    <p>Chapter One</p>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=2000" class="parallax-img">
                <div class="text-overlay">
                    <h2>Urban Grace</h2>
                    <p>Collection 2026</p>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?q=80&w=2000" class="parallax-img">
                <div class="text-overlay">
                    <h2>Elegance</h2>
                    <p>The Statement</p>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070" class="parallax-img">
                <div class="text-overlay">
                    <h2>Moments</h2>
                    <p>Captured Forever</p>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?q=80&w=2000" class="parallax-img">
                <div class="text-overlay">
                    <h2>Minimal</h2>
                    <p>Less is More</p>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1522673607200-164883eeca48?q=80&w=2000" class="parallax-img">
                <div class="text-overlay">
                    <h2>Finale</h2>
                    <p>Reserve Your Date</p>
                </div>
            </div>
        </section>
    </div>

    <div class="footer-spacer"></div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        gsap.utils.toArray(".section").forEach((section) => {
            const img = section.querySelector(".parallax-img");
            const text = section.querySelector(".text-overlay");

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: section,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: 1.2 /* Smooth catch-up */
                }
            });

            // Deep parallax for the image
            tl.fromTo(img, 
                { y: "-20%" }, 
                { y: "20%", ease: "none" }, 
                0
            );

            // Text moves in opposite direction for 3D effect
            tl.fromTo(text, 
                { y: "100px", opacity: 0 }, 
                { y: "-100px", opacity: 1, ease: "power1.out" }, 
                0
            );
        });
    </script>
</body>
</html>
