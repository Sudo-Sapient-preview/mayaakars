<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayaakars Unified Hero</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;1,400;1,600&family=Geist:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0A0A0A',
                        foreground: '#E3E4E0',
                        gold: '#C49A3A',
                    },
                    fontFamily: {
                        sans: ['Geist', 'sans-serif'],
                        serif: ['Cormorant', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- GSAP Core & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        body {
            background-color: #0A0A0A;
            color: #E3E4E0;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Prevents overscroll bounce on Mac which can mess with the scroll locking */
            overscroll-behavior-y: none;
        }

        /* Blueprint grid pattern via CSS to keep HTML cleaner */
        .bg-blueprint {
            background-image:
                linear-gradient(#C49A3A 1px, transparent 1px),
                linear-gradient(90deg, #C49A3A 1px, transparent 1px);
            background-size: 60px 60px;
        }
    </style>
</head>

<body>

    <!-- Spacer drives the scroll — 400vh for slower morphing effect -->
    <div id="spacer" style="height: 400vh;"></div>

    <!-- Fixed door — always locked to viewport (z-[1]) -->
    <div id="hero-container" class="fixed inset-0 overflow-hidden bg-[#0A0A0A] z-[1] transition-opacity duration-1000">
        <!-- Blueprint grid -->
        <div class="absolute inset-0 pointer-events-none opacity-[0.04] bg-blueprint"></div>

        <!-- DOOR -->
        <div class="door-wrapper absolute inset-0 flex items-center justify-center"
            style="perspective: 1400px; transform-origin: center center;">
            <!-- DESKTOP DOOR -->
            <svg viewBox="0 0 1000 780" class="hidden md:block w-[90vw] max-w-[1100px] h-[78vh] max-h-[780px]"
                fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
                <!-- Infinite Wall/Floor structure to fill empty space -->
                <g stroke="#C49A3A">
                    <!-- Floor lines -->
                    <path class="draw-path" d="M-3000 772 L10 772" stroke-width="5" stroke-opacity="0.8" />
                    <path class="draw-path" d="M990 772 L4000 772" stroke-width="5" stroke-opacity="0.8" />
                    <!-- Inner floor lines -->
                    <path class="draw-path" d="M-3000 782 L10 782" stroke-width="1.2" stroke-opacity="0.3" />
                    <path class="draw-path" d="M990 782 L4000 782" stroke-width="1.2" stroke-opacity="0.3" />

                    <!-- Ceiling lines (fainter) -->
                    <path class="draw-path" d="M-3000 8 L10 8" stroke-width="1.5" stroke-opacity="0.4" />
                    <path class="draw-path" d="M990 8 L4000 8" stroke-width="1.5" stroke-opacity="0.4" />

                    <!-- Faint structure columns in the background to fill space -->
                    <path class="draw-path" d="M-600 8 L-600 772" stroke-width="1" stroke-opacity="0.2" />
                    <path class="draw-path" d="M-1200 8 L-1200 772" stroke-width="1" stroke-opacity="0.2" />
                    <path class="draw-path" d="M1600 8 L1600 772" stroke-width="1" stroke-opacity="0.2" />
                    <path class="draw-path" d="M2200 8 L2200 772" stroke-width="1" stroke-opacity="0.2" />
                </g>

                <!-- Outer frame -->
                <g stroke="#C49A3A">
                    <path class="draw-path" d="M10 772 L10 8 L990 8 L990 772" stroke-width="5" />
                    <path class="draw-path" d="M28 772 L28 32 L972 32 L972 772" stroke-width="1.2"
                        stroke-opacity="0.3" />
                </g>

                <!-- LEFT DOOR -->
                <g class="door-left-g">
                    <rect class="draw-path" x="10" y="16" width="490" height="748" fill="#0A0A0A" stroke="#C49A3A"
                        stroke-width="2" />
                    <rect class="draw-path" x="30" y="40" width="454" height="700" stroke="#C49A3A" stroke-width="0.9"
                        stroke-opacity="0.35" />
                    <rect class="draw-path" x="52" y="64" width="412" height="300" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <rect class="draw-path" x="52" y="384" width="412" height="300" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <!-- Handle -->
                    <g class="knob-left">
                        <circle class="draw-path" cx="484" cy="390" r="9" fill="#C49A3A" stroke="#C49A3A" />
                        <rect class="draw-path" x="482" y="365" width="4" height="50" fill="#C49A3A" stroke="#C49A3A"
                            rx="2" />
                    </g>
                </g>

                <!-- RIGHT DOOR -->
                <g class="door-right-g">
                    <rect class="draw-path" x="500" y="16" width="490" height="748" fill="#0A0A0A" stroke="#C49A3A"
                        stroke-width="2" />
                    <rect class="draw-path" x="516" y="40" width="454" height="700" stroke="#C49A3A" stroke-width="0.9"
                        stroke-opacity="0.35" />
                    <rect class="draw-path" x="536" y="64" width="412" height="300" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <rect class="draw-path" x="536" y="384" width="412" height="300" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <!-- Handle -->
                    <g class="knob-right">
                        <circle class="draw-path" cx="516" cy="390" r="9" fill="#C49A3A" stroke="#C49A3A" />
                        <rect class="draw-path" x="514" y="365" width="4" height="50" fill="#C49A3A" stroke="#C49A3A"
                            rx="2" />
                    </g>
                </g>
            </svg>

            <!-- MOBILE DOOR -->
            <svg viewBox="0 0 500 1000" class="block md:hidden w-[90vw] h-[80vh] max-h-[1000px] mt-10" fill="none"
                xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
                <!-- Infinite Wall/Floor structure -->
                <g stroke="#C49A3A">
                    <path class="draw-path" d="M-1000 992 L10 992" stroke-width="5" stroke-opacity="0.8" />
                    <path class="draw-path" d="M490 992 L1500 992" stroke-width="5" stroke-opacity="0.8" />
                    <path class="draw-path" d="M-1000 1002 L10 1002" stroke-width="1.2" stroke-opacity="0.3" />
                    <path class="draw-path" d="M490 1002 L1500 1002" stroke-width="1.2" stroke-opacity="0.3" />
                    <path class="draw-path" d="M-1000 8 L10 8" stroke-width="1.5" stroke-opacity="0.4" />
                    <path class="draw-path" d="M490 8 L1500 8" stroke-width="1.5" stroke-opacity="0.4" />
                    <path class="draw-path" d="M-300 8 L-300 992" stroke-width="1" stroke-opacity="0.2" />
                    <path class="draw-path" d="M800 8 L800 992" stroke-width="1" stroke-opacity="0.2" />
                </g>

                <!-- Outer frame -->
                <g stroke="#C49A3A">
                    <path class="draw-path" d="M10 992 L10 8 L490 8 L490 992" stroke-width="5" />
                    <path class="draw-path" d="M28 992 L28 32 L472 32 L472 992" stroke-width="1.2"
                        stroke-opacity="0.3" />
                </g>

                <!-- LEFT DOOR -->
                <g class="door-left-g-mob">
                    <rect class="draw-path" x="10" y="16" width="240" height="968" fill="#0A0A0A" stroke="#C49A3A"
                        stroke-width="2" />
                    <rect class="draw-path" x="30" y="40" width="200" height="920" stroke="#C49A3A" stroke-width="0.9"
                        stroke-opacity="0.35" />
                    <rect class="draw-path" x="45" y="60" width="170" height="400" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <rect class="draw-path" x="45" y="490" width="170" height="400" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <!-- Handle -->
                    <g class="knob-left-mob">
                        <circle class="draw-path" cx="230" cy="500" r="7" fill="#C49A3A" stroke="#C49A3A" />
                        <rect class="draw-path" x="228" y="475" width="4" height="50" fill="#C49A3A" stroke="#C49A3A"
                            rx="2" />
                    </g>
                </g>

                <!-- RIGHT DOOR -->
                <g class="door-right-g-mob">
                    <rect class="draw-path" x="250" y="16" width="240" height="968" fill="#0A0A0A" stroke="#C49A3A"
                        stroke-width="2" />
                    <rect class="draw-path" x="270" y="40" width="200" height="920" stroke="#C49A3A" stroke-width="0.9"
                        stroke-opacity="0.35" />
                    <rect class="draw-path" x="285" y="60" width="170" height="400" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <rect class="draw-path" x="285" y="490" width="170" height="400" stroke="#C49A3A" stroke-width="0.7"
                        stroke-opacity="0.3" />
                    <!-- Handle -->
                    <g class="knob-right-mob">
                        <circle class="draw-path" cx="270" cy="500" r="7" fill="#C49A3A" stroke="#C49A3A" />
                        <rect class="draw-path" x="268" y="475" width="4" height="50" fill="#C49A3A" stroke="#C49A3A"
                            rx="2" />
                    </g>
                </g>
            </svg>
        </div>

        <!-- TEXT OVERLAY -->
        <div class="absolute inset-0 z-10 pointer-events-none px-6">
            <div class="sticky top-[40vh] mx-auto w-full max-w-[900px]">
                <div class="relative min-h-[140px] lg:min-h-[220px] w-full text-center">

                    <div class="step-content step-1 absolute inset-0 flex items-center justify-center">
                        <h2
                            class="font-serif text-[26px] sm:text-[32px] md:text-[42px] lg:text-[72px] text-[#E3E4E0] leading-[1.1] tracking-tight text-center px-6 md:px-0">
                            Architecture & Interiors, <br />
                            <span class="text-gold italic">Crafted as One</span>
                        </h2>
                    </div>

                    <div class="step-content step-2 absolute inset-0 flex items-center justify-center">
                        <h2
                            class="font-serif text-[26px] sm:text-[32px] md:text-[42px] lg:text-[72px] text-[#E3E4E0] leading-[1.1] tracking-tight text-center px-6 md:px-0">
                            We don't just execute; <br /> we <span class="text-gold">manifest</span> ambitions.
                        </h2>
                    </div>

                    <div class="step-content step-3 absolute inset-0 flex items-center justify-center">
                        <h2
                            class="font-serif text-[24px] sm:text-[28px] md:text-[38px] lg:text-[64px] text-[#E3E4E0] leading-[1.1] text-center px-6 md:px-0">
                            Crafting the intangible <br /> into <span
                                class="italic uppercase tracking-[0.16em] lg:tracking-[0.3em]">Reality.</span>
                        </h2>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(ScrollTrigger);

            const container = document.getElementById("hero-container");
            const spacer = document.getElementById("spacer");
            let canClick = false;
            let isReleased = false;
            let heroEndScrollY = Infinity;

            function notifyParentRelease() {
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({ type: "mayaakars-hero-release" }, "*");
                }
            }

            function releaseHero() {
                if (!canClick || isReleased) return;

                isReleased = true;

                gsap.to(container, {
                    autoAlpha: 0,
                    duration: 1,
                    ease: "power2.inOut",
                    onComplete: () => {
                        container.style.display = "none";
                        notifyParentRelease();
                    }
                });

                window.scrollTo({
                    top: heroEndScrollY + 10,
                    behavior: "smooth"
                });
            }

            gsap.set(".step-content", {
                opacity: 0,
                filter: "blur(20px)",
                y: 0
            });
            gsap.set(".door-left-g, .door-left-g-mob", { x: 0 });
            gsap.set(".door-right-g, .door-right-g-mob", { x: 0 });
            gsap.set(".draw-path", { strokeDasharray: 3000, strokeDashoffset: 3000 });

            const drawTl = gsap.timeline({ delay: 0.2 });
            drawTl.to(".draw-path", {
                strokeDashoffset: 0,
                duration: 2.2,
                stagger: { amount: 2 },
                ease: "power2.inOut",
            });

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: spacer,
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1.5,
                    onUpdate: (self) => {
                        heroEndScrollY = self.end;
                        const atEnd = self.progress >= 0.98;

                        if (canClick !== atEnd) {
                            canClick = atEnd;
                            container.style.cursor = canClick ? "pointer" : "default";
                        }

                        if (isReleased && !atEnd) {
                            isReleased = false;
                            container.style.display = "";
                            gsap.set(container, { autoAlpha: 1 });
                        }

                        if (atEnd && !isReleased) {
                            releaseHero();
                        }
                    },
                },
            });

            tl.add("openDoors")
                .to(".door-left-g", { x: -520, duration: 3, ease: "power3.inOut" }, "openDoors")
                .to(".door-left-g-mob", { x: -280, duration: 3, ease: "power3.inOut" }, "openDoors")
                .to(".door-right-g", { x: 520, duration: 3, ease: "power3.inOut" }, "openDoors")
                .to(".door-right-g-mob", { x: 280, duration: 3, ease: "power3.inOut" }, "openDoors")
                .to(".knob-left", { rotation: -90, svgOrigin: "484 390", duration: 1.8, ease: "power2.inOut" }, "openDoors")
                .to(".knob-right", { rotation: 90, svgOrigin: "516 390", duration: 1.8, ease: "power2.inOut" }, "openDoors")
                .to(".knob-left-mob", { rotation: -90, svgOrigin: "230 500", duration: 1.8, ease: "power2.inOut" }, "openDoors")
                .to(".knob-right-mob", { rotation: 90, svgOrigin: "270 500", duration: 1.8, ease: "power2.inOut" }, "openDoors")
                .to(".step-1", {
                    opacity: 1,
                    filter: "blur(0px)",
                    duration: 1.5,
                    ease: "power2.out"
                }, "openDoors+=2.5")
                .to(".step-1", {
                    opacity: 0,
                    filter: "blur(20px)",
                    duration: 1.2,
                    ease: "power2.in"
                })
                .to(".door-wrapper", { scale: 12, autoAlpha: 0, duration: 4, ease: "power2.in" })
                .to(".step-2", {
                    opacity: 1,
                    filter: "blur(0px)",
                    duration: 1.5,
                    ease: "power2.out"
                })
                .to(".step-2", {
                    opacity: 0,
                    filter: "blur(20px)",
                    duration: 1.2,
                    ease: "power2.in"
                })
                .to(".step-3", {
                    opacity: 1,
                    filter: "blur(0px)",
                    duration: 1.5,
                    ease: "power2.out"
                });

            container.addEventListener("click", releaseHero);
        });
    </script>
</body>

</html>
