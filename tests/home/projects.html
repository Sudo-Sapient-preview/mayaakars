<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Carousel with Titles</title>
    <style>
        :root {
            --card-w: min(800px, 85vw);
            --card-h: calc(var(--card-w) * 0.625);
        }

        /* --- Base & Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            min-height: 100dvh;
            cursor: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Header --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 28px clamp(16px, 5vw, 50px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .logo {
            font-weight: 800;
            font-size: 28px;
            line-height: 1;
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }

        .hamburger {
            width: 34px;
            height: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: auto;
            cursor: pointer;
        }

        .hamburger span {
            display: block;
            height: 2px;
            background: #fff;
            width: 100%;
        }

        /* --- Custom Drag Cursor (Desktop Only) --- */
        .cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease;
        }

        .cursor.active {
            transform: translate(-50%, -50%) scale(0.7);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
        }

        /* --- 3D VR Scene Setup (Desktop) --- */
        .scene {
            width: 100vw;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            overflow: hidden;
        }

        .carousel {
            position: relative;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
        }

        /* --- Landscape Cards (Desktop) --- */
        .card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            top: calc(var(--card-h) / -2);
            left: calc(var(--card-w) / -2);
            border-radius: 16px;
            background: transparent;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
            backface-visibility: hidden;
            cursor: pointer;
            -webkit-box-reflect: below 25px linear-gradient(transparent, transparent 50%, rgba(255, 255, 255, 0.15));
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            border-radius: 16px;
        }

        .card-info {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            padding: 24px 0 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 8px;
            pointer-events: none;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }

        .card-subtitle {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        /* --- Mobile Snap Scroll Section --- */
        .mobile-snap-container {
            display: none;
            width: 100vw;
            height: 100dvh;
            overflow-x: scroll;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .mobile-snap-container::-webkit-scrollbar {
            display: none;
        }

        .mobile-snap-card {
            flex-shrink: 0;
            width: 100vw;
            height: 100dvh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mobile-card-inner {
            width: 85vw;
            height: calc(85vw * 0.625);
            margin-top: -15vh;
            position: relative;
            background: transparent;
            /* JS will handle transform */
            will-change: transform;
            -webkit-box-reflect: below 25px linear-gradient(transparent, transparent 50%, rgba(255, 255, 255, 0.15));
        }

        .mobile-card-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            /* Base filter */
            filter: brightness(0.7);
            /* JS handles the dynamic transitions */
            will-change: transform, filter;
            transition: opacity 0.3s ease;
        }

        .mobile-snap-card:active .mobile-card-inner img {
            opacity: 0.8 !important;
            /* simple click feedback */
        }

        .mobile-card-info {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            padding: 24px 0 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 8px;
            pointer-events: none;
            will-change: transform, opacity;
        }

        .mobile-card-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }

        .mobile-card-subtitle {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Subtle scroll hint */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            right: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulseHintHorizontal 2s infinite ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes pulseHintHorizontal {

            0%,
            100% {
                opacity: 0.3;
                transform: translateX(0);
            }

            50% {
                opacity: 0.8;
                transform: translateX(-5px);
            }
        }

        /* --- Media Queries --- */
        @media (max-width: 768px) {
            body {
                cursor: auto;
                overflow: auto;
                /* Allow the mobile container to scroll */
            }

            .cursor {
                display: none;
            }

            /* Hide Desktop 3D Scene */
            .scene {
                display: none;
            }

            /* Show Mobile Snap Container */
            .mobile-snap-container {
                display: flex;
            }
        }
    </style>
</head>

<body>

    <div class="cursor" id="cursor">DRAG</div>

    <header>
        <!-- Logo and Menu button removed for minimalism or left as is -->
        <div style="flex: 1"></div>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <!-- Desktop 3D Scene -->
    <main class="scene" id="desktopScene">
        <div class="carousel" id="carousel"></div>
    </main>

    <!-- Mobile Snap Scroll Scene -->
    <main class="mobile-snap-container" id="mobileScene"></main>

    <script>
        const carousel = document.getElementById('carousel');
        const mobileContainer = document.getElementById('mobileScene');
        const cursor = document.getElementById('cursor');

        // Array of objects holding both the image and the project title
        const projects = [
            { title: "Nordic Retreat", src: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=1000&q=80" },
            { title: "Glass Pavilion", src: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=1000&q=80" },
            { title: "The Atrium", src: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1000&q=80" },
            { title: "Concrete Villa", src: "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1000&q=80" },
            { title: "Desert House", src: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1000&q=80" },
            { title: "Alpine Cabin", src: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=1000&q=80" },
            { title: "Lakeside Estate", src: "https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1000&q=80" },
            { title: "Urban Loft", src: "https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?auto=format&fit=crop&w=1000&q=80" }
        ];

        // --- Build Mobile Scene ---
        projects.forEach((project, i) => {
            const card = document.createElement('div');
            card.classList.add('mobile-snap-card');

            card.addEventListener('click', () => {
                alert(`Loading project page for: ${project.title}`);
            });

            const scrollHintHtml = i === 0 ? `<div class="scroll-hint">Swipe Left &rarr;</div>` : '';

            card.innerHTML = `
                <div class="mobile-card-inner">
                    <img src="${project.src}" alt="${project.title}">
                    <div class="mobile-card-info">
                        <div class="mobile-card-title">${project.title}</div>
                        <div class="mobile-card-subtitle">View Project</div>
                    </div>
                    ${scrollHintHtml}
                </div>
            `;
            mobileContainer.appendChild(card);
        });

        // --- Build Desktop 3D Scene ---
        const numCards = projects.length;
        const theta = 360 / numCards;

        projects.forEach((project, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.title = project.title;

            card.innerHTML = `
                <img src="${project.src}" alt="${project.title}">
                <div class="card-info">
                    <div class="card-title">${project.title}</div>
                    <div class="card-subtitle">View Project</div>
                </div>
            `;
            carousel.appendChild(card);
        });

        const cards = Array.from(document.querySelectorAll('.card'));

        let isDragging = false;
        let startX = 0, startY = 0;
        let targetRotation = 0;
        let currentRotation = -360;

        // Desktop Input Handling
        window.addEventListener('pointerdown', (e) => {
            if (window.innerWidth <= 768) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            cursor.classList.add('active');
            cursor.innerText = "";
        });

        window.addEventListener('pointermove', (e) => {
            if (window.innerWidth <= 768) return;
            cursor.style.left = `${e.clientX}px`;
            cursor.style.top = `${e.clientY}px`;
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            targetRotation -= deltaX * 0.08;
            startX = e.clientX;
        });

        window.addEventListener('pointerup', (e) => {
            if (window.innerWidth <= 768) return;
            isDragging = false;
            cursor.classList.remove('active');
            cursor.innerText = "DRAG";
            const distanceMoved = Math.sqrt(Math.pow(e.clientX - startX, 2) + Math.pow(e.clientY - startY, 2));
            if (distanceMoved < 5) {
                const clickedCard = e.target.closest('.card');
                if (clickedCard) {
                    alert(`Loading project page for: ${clickedCard.dataset.title}`);
                }
            }
        });

        window.addEventListener('mouseout', () => {
            cursor.style.opacity = '0';
        });
        window.addEventListener('mouseover', () => {
            cursor.style.opacity = '1';
        });

        // Physics Engine & Render Loop (both Desktop and Mobile)
        let animationFrameId;
        function animate() {
            if (window.innerWidth > 768) {
                // DESKTOP: 3D Carousel Logic
                currentRotation += (targetRotation - currentRotation) * 0.05;

                carousel.style.transform = `
                    translateZ(350px)
                    rotateX(-5deg) 
                    rotateY(${currentRotation}deg)
                `;

                cards.forEach((card, index) => {
                    const cardAngle = index * theta;
                    const vrRadius = 1000;

                    card.style.transform = `
                        rotateY(${cardAngle}deg) 
                        translateZ(${-vrRadius}px) 
                    `;

                    const relativeAngle = (cardAngle + currentRotation) % 360;
                    let normalizedAngle = relativeAngle;
                    if (normalizedAngle < 0) normalizedAngle += 360;

                    let distFromCenter = normalizedAngle;
                    if (distFromCenter > 180) distFromCenter = 360 - distFromCenter;

                    const MathCos = Math.cos(distFromCenter * Math.PI / 180);
                    const intensity = Math.pow(Math.max(0, MathCos), 6);

                    card.style.opacity = 0.3 + (0.7 * intensity);
                    card.style.filter = `grayscale(${80 - (intensity * 80)}%) brightness(${0.5 + (intensity * 0.5)})`;

                    const infoBox = card.querySelector('.card-info');
                    if (infoBox) {
                        infoBox.style.opacity = Math.pow(intensity, 2);
                        const yOffset = (1 - intensity) * 40;
                        infoBox.style.transform = `translateY(${yOffset}px)`;
                    }
                });
            } else {
                // MOBILE: Scroll-driven parallax and scaling logic
                const containerCenter = mobileContainer.scrollLeft + window.innerWidth / 2;
                const mobileCards = Array.from(document.querySelectorAll('.mobile-snap-card'));

                mobileCards.forEach((card) => {
                    // card's true center in the scrollable view
                    const cardCenter = card.offsetLeft + card.offsetWidth / 2;
                    const distFromCenter = Math.abs(containerCenter - cardCenter);

                    const maxDist = window.innerWidth;
                    let intensity = 1 - (distFromCenter / maxDist);
                    if (intensity < 0) intensity = 0;

                    // Emphasize the effect mapping
                    intensity = Math.pow(intensity, 1.2);

                    const inner = card.querySelector('.mobile-card-inner');
                    const img = card.querySelector('img');
                    const info = card.querySelector('.mobile-card-info');

                    if (inner) {
                        // Shrink card when it's off-center
                        const scale = 0.85 + (0.15 * intensity);
                        inner.style.transform = `scale(${scale})`; // Needs interpolation
                    }

                    if (img) {
                        // Grayscale and darken off-center cards
                        img.style.filter = `grayscale(${80 - (intensity * 80)}%) brightness(${0.5 + (intensity * 0.5)})`;

                        // Parallax effect: shift image to counter the scroll direction slightly
                        const flexDist = (cardCenter - containerCenter);
                        const parallax = flexDist * 0.25;
                        img.style.transform = `translateX(${parallax}px) scale(1.15)`; // Scale up internally to prevent clipping from parallax
                    }

                    if (info) {
                        // Fade in and slide up
                        info.style.opacity = Math.pow(intensity, 2);
                        const yOffset = (1 - intensity) * 50;
                        info.style.transform = `translateY(${yOffset}px)`;
                    }
                });
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                isDragging = false;
                cursor.classList.remove('active');
                cursor.innerText = "DRAG";
            }
        });

    </script>
</body>

</html>
