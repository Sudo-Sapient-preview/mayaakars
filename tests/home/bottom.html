<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Focal Fade</title>

    <style>
        :root {
            --bg-color: #fff;
            --text-color: #000;
        }

        html {
            scroll-behavior: smooth;
            background-color: #f0f0f0;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100dvh;
        }

        .logo {
            position: fixed;
            top: 30px;
            left: 40px;
            font-weight: 700;
            z-index: 100;
        }

        section {
            height: 70vh;
            /* Reduced from 100vh */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 500;
            opacity: 0.3;
            transition: opacity 1s ease, transform 1s ease;
            transform: translateY(20px);
        }

        section.is-visible h1 {
            opacity: 1;
            transform: translateY(0);
        }

        .text {
            font-size: clamp(2.5rem, 12vw, 10rem);
            font-weight: 500;
            line-height: 1.05;
            text-wrap: balance;
            opacity: 0.3;
            transition: opacity 1s ease, transform 1s ease;
            transform: translateY(20px);
        }

        .btn-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        section.is-visible .btn-group {
            opacity: 1;
        }

        .btn {
            padding: 14px 32px;
            border: 1px solid currentColor;
            border-radius: 50px;
            text-decoration: none;
            color: inherit;
            font-size: 14px;
            transition: all 0.4s ease;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .studio-details {
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 1s ease;
        }

        section.is-visible .studio-details {
            opacity: 1;
        }

        .contact-item {
            margin: 0;
            font-size: 1rem;
        }

        .address {
            margin: 0;
            font-size: 1.5rem;
            line-height: 1.6;
            opacity: 0.7;
        }

        .form-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            opacity: 0;
            gap: 15px;
            transition: opacity 1.2s ease;
        }

        section.is-visible .form-group {
            opacity: 1;
        }

        .contact-input {
            padding: 14px 20px;
            border: 1px solid currentColor;
            border-radius: 8px;
            background: transparent;
            color: inherit;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .contact-input::placeholder {
            opacity: 0.5;
        }

        .contact-input:focus {
            outline: none;
            border-color: var(--text-color);
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            section {
                height: auto;
                min-height: 70vh;
                padding: 60px 20px;
            }

            .address {
                font-size: 1.1rem;
            }

            .btn {
                padding: 12px 24px;
                font-size: 13px;
            }

            .contact-info {
                padding: 0 16px;
            }

            .form-group {
                max-width: 100%;
                padding: 0 10px;
            }
        }

        @media (max-width: 480px) {
            section {
                padding: 40px 16px;
            }

            .address {
                font-size: 0.95rem;
            }

            .contact-item {
                font-size: 0.85rem;
            }

            .btn-group {
                flex-direction: column;
                width: 100%;
                max-width: 280px;
            }

            .btn {
                text-align: center;
            }

            .logo {
                top: 16px;
                left: 20px;
            }
        }
    </style>
</head>

<body>


    <section id="black-section">
        <div class="contact-info">
            <h1 class="text">MAYAAKARS</h1>
            <div class="studio-details">
                <p class="contact-item">Phone: +91 88844 96888</p>
                <p class="contact-item">Email: info@mayaakars.com</p>
                <p class="address">
                    303, 2nd Floor, 15th A Cross Rd,<br>
                    Sector A, Yelahanka Satellite Town,<br>
                    Yelahanka New Town,<br>
                    Bengaluru, Karnataka 560064
                </p>
            </div>
        </div>
    </section>

    <section id="white-section">
        <h1>We are always happy to help</h1>
        <div class="form-group">
            <input type="email" placeholder="Enter your email" class="contact-input" />
            <input type="tel" placeholder="Enter your phone number" class="contact-input" />
        </div>
        <div class="btn-group">
            <a href="#" class="btn">Send Enquiry</a>
        </div>
    </section>

    <script>
        const sections = document.querySelectorAll('section');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, {
            threshold: 0,
            rootMargin: "-50% 0px -50% 0px"
        });

        sections.forEach(section => observer.observe(section));
    </script>

</body>

</html>
