<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayaakars Loading Screen</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;600&family=Geist:wght@400;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config to match your project variables -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        gold: 'var(--gold)',
                    },
                    fontFamily: {
                        sans: ['var(--font-geist)', 'sans-serif'],
                        serif:['var(--font-cormorant)', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --background: #0A0A0A;
            --foreground: #E3E4E0;
            --gold: #C49A3A;
            --gold-glow: rgba(196, 154, 58, 0.8);
            --font-geist: 'Geist', sans-serif;
            --font-cormorant: 'Cormorant', serif;
        }

        body {
            background: var(--background);
            color: var(--foreground);
            font-family: var(--font-geist);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            height: 100dvh;
        }

        h1, h2, h3, .wordmark {
            font-family: var(--font-cormorant);
        }

        * {
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Custom animations from blueprint */
        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(196, 154, 58, 0.6)); }
            50% { filter: drop-shadow(0 0 40px rgba(196, 154, 58, 1)); }
        }

        .animate-glow {
            animation: glow-pulse 1.5s ease-in-out infinite;
        }

        @keyframes fade-in-black {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fade-in-section {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .footer-marquee {
            animation: marquee 20s linear infinite;
        }

        @media (max-width: 480px) {
            body {
                height: auto;
                min-height: 100dvh;
            }
        }
    </style>
</head>
<body>

    <!-- Dummy Navbar to demonstrate where the logo glides to (80px height) -->
    <header class="h-[80px] w-full flex items-center justify-center border-b border-white/10 relative z-0 opacity-0 transition-opacity duration-1000" id="navbar">
        <h2 class="text-xl text-gold font-serif">Main Content Placeholder</h2>
    </header>

    <!-- LOADING SCREEN -->
    <div class="loading-screen fixed inset-0 bg-[#0A0A0A] flex items-center justify-center z-[9999] pointer-events-none overflow-hidden">
        <div class="brand-container relative flex items-center justify-center overflow-visible">
            
            <!-- Text Wrapper - starts behind logo -->
            <div class="absolute left-[8px] sm:left-[18px] lg:left-[30px] w-[210px] sm:w-[300px] lg:w-[600px]">
                <h1 id="mayaakars-text" class="font-serif text-[22px] sm:text-[40px] lg:text-[72px] text-[#E3E4E0] tracking-[0.08em] sm:tracking-[0.15em] leading-none uppercase whitespace-nowrap">
                    <!-- JavaScript will inject spans here -->
                </h1>
            </div>

            <!-- Logo - kept in foreground -->
            <div class="loading-logo-wrapper relative z-10">
                <!-- Replace 'src' with your actual path: src="/images/logo-gold.png" -->
                <!-- The current SVG data URI acts as a temporary gold geometric logo for visualization -->
                <img
                    src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140' viewBox='0 0 140 140'><circle cx='70' cy='70' r='60' fill='none' stroke='%23C49A3A' stroke-width='4'/><rect x='45' y='45' width='50' height='50' fill='none' stroke='%23C49A3A' stroke-width='4' transform='rotate(45 70 70)'/></svg>"
                    alt="Mayaakars Logo"
                    class="loading-logo w-[64px] h-[64px] sm:w-[80px] sm:h-[80px] lg:w-[140px] lg:h-[140px] animate-glow"
                />
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const isSmallScreen = window.innerWidth < 640;
            const lateralShift = isSmallScreen ? -72 : -120;
            const finalScale = isSmallScreen ? 0.45 : 0.25;
            const navbarYOffset = isSmallScreen ? 34 : 40;

            // 1. Prepare Text (split into spans like React component)
            const textContainer = document.getElementById("mayaakars-text");
            const brandName = "Mayaakars";
            
            brandName.split("").forEach(char => {
                const span = document.createElement("span");
                span.className = "loading-char inline-block";
                span.textContent = char;
                textContainer.appendChild(span);
            });

            // 2. Setup GSAP Timeline
            const tl = gsap.timeline({
                delay: 0.5,
                onComplete: () => {
                    // Triggered when loading finishes (simulates `onComplete` prop)
                    console.log("Loading animation complete!");
                    
                    // Reveal the dummy navbar/content for demonstration
                    document.getElementById("navbar").style.opacity = "1";
                    
                    // Remove loading screen from DOM if desired
                    // document.querySelector('.loading-screen').remove();
                }
            });

            // Initial states
            gsap.set(".loading-logo", { opacity: 0, scale: 0.9, rotation: 0, x: 0 });
            gsap.set(".loading-char", { opacity: 0 });

            tl
                // 1. Reveal Logo in center
                .to(".loading-logo", {
                    opacity: 1,
                    scale: 1,
                    duration: 1.2,
                    ease: "power2.out",
                })
                // 2. Rotate Left + Move Logo left
                .to(".loading-logo", {
                    rotation: -360,
                    x: lateralShift, // Move further left to make more space for text
                    duration: 2.5,
                    ease: "power3.inOut"
                })
                // 3. Reveal Text from "inside" logo
                .to(".loading-char", {
                    opacity: 1,
                    duration: 0.5,
                    stagger: 0.06,
                    ease: "power2.inOut",
                })
                // 4. Pause
                .to({}, { duration: 1.5 })

                // 5. Rotate Right + Move Logo back to center
                .to(".loading-logo", {
                    rotation: 0,
                    x: 0,
                    duration: 2.5,
                    ease: "power3.inOut"
                })
                // 6. Text goes "into" logo
                .to(".loading-char", {
                    opacity: 0,
                    duration: 0.35,
                    stagger: { each: 0.04, from: "end" },
                    ease: "power2.in",
                }, "-=2.2")

                // 7. Short pause in center (as requested)
                .to({}, { duration: 0.5 })

                // 8. Final Glide to Navbar
                .to(".loading-logo", {
                    y: -window.innerHeight / 2 + navbarYOffset, // Match header center
                    x: 0, // Keep centered horizontally
                    scale: finalScale,
                    duration: 2,
                    ease: "power4.inOut"
                })
                .to(".loading-screen", {
                    opacity: 0,
                    duration: 1,
                    ease: "power2.inOut",
                }, "-=0.8");
        });
    </script>
</body>
</html>
