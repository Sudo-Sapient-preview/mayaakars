<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architectural Generations | Interactive Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
        /* --- Base Setup --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            background-color: #000;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* --- Full Screen Sections --- */
        section {
            height: 100dvh;
            min-height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        .blank-page {
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scroll-indicator {
            font-size: 10px;
            letter-spacing: 5px;
            opacity: 0.3;
            text-transform: uppercase;
        }

        /* --- 5-Layer Accordion --- */
        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .menu-strip {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            /* Using a heavy, slow easing for architectural feel */
            transition: flex 0.9s cubic-bezier(0.2, 1, 0.2, 1);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .strip-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) brightness(0.3);
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.2, 1), filter 0.8s ease;
            transform: scale(1.15); /* Deep zoom ready for reveal */
        }

        /* --- Expand State --- */
        .menu-strip:hover {
            flex: 6; 
        }

        .menu-strip:hover .strip-bg {
            transform: scale(1);
            filter: grayscale(0%) brightness(0.6);
        }

        /* --- Typography Layers --- */
        .content {
            position: relative;
            z-index: 5;
            text-align: center;
            pointer-events: none;
            width: 90%;
        }

        .subtitle {
            display: block;
            font-size: clamp(10px, 0.8vw, 14px);
            letter-spacing: 6px;
            margin-bottom: 12px;
            opacity: 0.5;
            transition: opacity 0.5s, transform 0.5s;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }

        .title {
            font-size: clamp(0.5rem, 6vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -2px;
            transition: letter-spacing 0.8s ease;
        }

        .menu-strip:hover .subtitle {
            opacity: 1;
            transform: translateY(-5px);
        }

        .menu-strip:hover .title {
            letter-spacing: 0px;
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            html {
                scroll-snap-type: none;
            }

            section {
                min-height: 100dvh;
            }

            .title {
                font-size: clamp(1.2rem, 5vw, 3rem);
                letter-spacing: -1px;
                line-height: 1;
            }

            .subtitle {
                font-size: 9px;
                letter-spacing: 3px;
                margin-bottom: 8px;
            }

            .menu-strip {
                transition: flex 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            }

            .menu-strip.active-touch {
                flex: 4;
            }

            .menu-strip.active-touch .strip-bg {
                transform: scale(1);
                filter: grayscale(0%) brightness(0.6);
            }

            .menu-strip.active-touch .subtitle {
                opacity: 1;
                transform: translateY(-5px);
            }

            .menu-strip.active-touch .title {
                letter-spacing: 0px;
            }

            .scroll-indicator {
                font-size: 9px;
                letter-spacing: 3px;
                text-align: center;
                width: calc(100% - 32px);
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: clamp(1rem, 5vw, 2rem);
            }

            .subtitle {
                font-size: 8px;
                letter-spacing: 2px;
            }

            .menu-strip {
                min-height: 72px;
            }
        }

    </style>
</head>
<body>

    <section class="blank-page">
        <div class="scroll-indicator">Scroll to Explore Details</div>
    </section>

    <section>
        <div class="menu-container">
            
            <div class="menu-strip">
                <div class="strip-bg" style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000')"></div>
                <div class="content">
                    <span class="subtitle">Structural Elements</span>
                    <h2 class="title">Architectural Details</h2>
                </div>
            </div>

            <div class="menu-strip">
                <div class="strip-bg" style="background-image: url('https://images.unsplash.com/photo-1516156008625-3a9d6067fab5?q=80&w=2000')"></div>
                <div class="content">
                    <span class="subtitle">Textures & Surfaces</span>
                    <h2 class="title">Material Finishes</h2>
                </div>
            </div>

            <div class="menu-strip">
                <div class="strip-bg" style="background-image: url('https://images.unsplash.com/photo-1507473885765-e6ed057f782c?q=80&w=2000')"></div>
                <div class="content">
                    <span class="subtitle">Illumination Design</span>
                    <h2 class="title">Lighting Elements</h2>
                </div>
            </div>

            <div class="menu-strip">
                <div class="strip-bg" style="background-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000')"></div>
                <div class="content">
                    <span class="subtitle">Interior Styling</span>
                    <h2 class="title">Interior Decor</h2>
                </div>
            </div>

            <div class="menu-strip">
                <div class="strip-bg" style="background-image: url('https://images.unsplash.com/photo-1449156001931-829f768c3ef5?q=80&w=2000')"></div>
                <div class="content">
                    <span class="subtitle">Outdoor Spaces</span>
                    <h2 class="title">Exterior Views</h2>
                </div>
            </div>

        </div>
    </section>

    <section class="blank-page">
        <div class="scroll-indicator">End of Selection</div>
    </section>

    <script>
        // Touch support for accordion strips
        if ('ontouchstart' in window) {
            document.querySelectorAll('.menu-strip').forEach(strip => {
                strip.addEventListener('click', () => {
                    document.querySelectorAll('.menu-strip').forEach(s => s.classList.remove('active-touch'));
                    strip.classList.add('active-touch');
                });
            });
        }
    </script>

</body>
</html>
