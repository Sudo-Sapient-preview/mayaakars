<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radaville Scroll Slider | Codegrid</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" />
    <style>
      :root {
        --base-100: #fff;
        --base-200: #2a2a2a;
        --base-300: #1f1f1f;
        --base-400: #0f0f0f;
        --base-500: #fb4016;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Geist Mono", sans-serif;
        background-color: var(--base-400);
        color: var(--base-100);
        overflow: hidden;
        min-height: 100dvh;
      }

      a, p {
        text-decoration: none;
        text-transform: uppercase;
        font-size: 0.8rem;
        font-weight: 400;
        letter-spacing: -0.0125rem;
        line-height: 1;
        display: inline-block;
      }

      nav {
        position: fixed;
        width: 100%;
        padding: 1.5rem;
        display: flex;
        gap: 1.5rem;
        z-index: 10;
      }

      .nav-logo, .nav-cta { flex: 1; display: flex; }
      .nav-cta { justify-content: flex-end; }
      .nav-links { flex: 2; display: flex; justify-content: center; gap: 0.25rem; }

      nav a {
        height: max-content;
        color: var(--base-100);
        background-color: var(--base-300);
        border: 1px solid var(--base-200);
        border-radius: 0.25rem;
        padding: 0.5rem 0.5rem;
      }

      .nav-logo a {
        font-weight: 500;
        color: var(--base-400);
        background-color: var(--base-500);
        border: none;
      }

      footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        padding: 1.5rem;
        display: flex;
        justify-content: space-between;
        z-index: 10;
      }

      .container {
        position: relative;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        touch-action: pan-y;
      }

      .slider {
        position: absolute;
        width: 100%;
        height: 100dvh;
        perspective: 250px;
        perspective-origin: 50% 100%;
      }

      .slide {
        position: absolute;
        top: 45%;
        left: 50%;
        transform: translate3d(-50%, -50%, 0px);
        width: 50%;
        height: 400px;
        border-radius: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        will-change: transform, opacity;
        overflow: hidden;
      }

      .slide-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .slide-title {
        position: relative;
        color: var(--base-100);
        font-family: "Inter", sans-serif;
        font-size: 4rem;
        font-weight: 450;
        letter-spacing: -0.15rem;
        z-index: 2;
        text-align: center;
        pointer-events: none;
        line-height: 0.95;
        text-wrap: balance;
      }

      @media (max-width: 1000px) {
        .nav-links { display: none; }
        .slide { width: 88%; height: 320px; }
        .slide-title { font-size: clamp(2rem, 6vw, 2.6rem); }
      }

      @media (max-width: 480px) {
        .slide { width: 94%; height: 240px; top: 47%; }
        .slide-title { font-size: clamp(1.45rem, 8vw, 1.8rem); letter-spacing: -0.04rem; }
        nav { padding: 1rem; gap: 1rem; }
        footer { padding: 1rem; }
        a, p { font-size: 0.7rem; }
      }
    </style>
  </head>
  <body>    

    <div class="container">
      <div class="slider"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
      const slideData = [
        { title: "Urban Edge", image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&q=80&w=1200" },
        { title: "Night Walk", image: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=1200" },
        { title: "Red Velvet", image: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&q=80&w=1200" },
        { title: "Studio Calm", image: "https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&q=80&w=1200" },
        { title: "Soft Light", image: "https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&q=80&w=1200" },
      ];

      const slider = document.querySelector(".slider");
      const container = document.querySelector(".container");
      let frontSlideIndex = 0;
      let isSliderAnimating = false;

      function initializeSlider() {
        slideData.forEach((data, i) => {
          const slide = document.createElement("div");
          slide.className = "slide";
          slide.innerHTML = `
            <img src="${data.image}" alt="${data.title}" class="slide-image" />
            <h1 class="slide-title">${data.title}</h1>
          `;
          slider.appendChild(slide);
          
          // Initial 3D Positioning
          gsap.set(slide, {
            y: -15 + 15 * i + "%",
            z: 15 * i,
            opacity: 1,
          });
        });
      }

      function handleSlideChange(direction = "down") {
        if (isSliderAnimating) return;
        isSliderAnimating = true;

        const slides = document.querySelectorAll(".slide");

        if (direction === "down") {
          const firstSlide = slides[0];
          frontSlideIndex = (frontSlideIndex + 1) % slideData.length;
          const nextIndex = (frontSlideIndex + 4) % slideData.length;
          const nextData = slideData[nextIndex];

          const newSlide = document.createElement("div");
          newSlide.className = "slide";
          newSlide.innerHTML = `
            <img src="${nextData.image}" class="slide-image" />
            <h1 class="slide-title">${nextData.title}</h1>
          `;
          slider.appendChild(newSlide);

          gsap.set(newSlide, { y: -15 + 15 * 5 + "%", z: 15 * 5, opacity: 0 });

          document.querySelectorAll(".slide").forEach((slide, i) => {
            const targetPos = i - 1;
            gsap.to(slide, {
              y: -15 + 15 * targetPos + "%",
              z: 15 * targetPos,
              opacity: targetPos < 0 ? 0 : 1,
              duration: 1,
              ease: "power3.inOut",
              onComplete: () => {
                if (i === 0) {
                  firstSlide.remove();
                  isSliderAnimating = false;
                }
              }
            });
          });
        } else {
          const lastSlide = slides[slides.length - 1];
          frontSlideIndex = (frontSlideIndex - 1 + slideData.length) % slideData.length;
          const prevData = slideData[frontSlideIndex];

          const newSlide = document.createElement("div");
          newSlide.className = "slide";
          newSlide.innerHTML = `
            <img src="${prevData.image}" class="slide-image" />
            <h1 class="slide-title">${prevData.title}</h1>
          `;
          slider.prepend(newSlide);

          gsap.set(newSlide, { y: -15 + 15 * -1 + "%", z: 15 * -1, opacity: 0 });

          document.querySelectorAll(".slide").forEach((slide, i) => {
            gsap.to(slide, {
              y: -15 + 15 * i + "%",
              z: 15 * i,
              opacity: i > 4 ? 0 : 1,
              duration: 1,
              ease: "power3.inOut",
              onComplete: () => {
                if (i === slides.length) {
                  lastSlide.remove();
                  isSliderAnimating = false;
                }
              }
            });
          });
        }
      }

      // Wheel Control with Accumulator
      let wheelAccumulator = 0;
      container.addEventListener("wheel", (e) => {
        e.preventDefault();
        wheelAccumulator += Math.abs(e.deltaY);
        if (wheelAccumulator >= 100 && !isSliderAnimating) {
          handleSlideChange(e.deltaY > 0 ? "down" : "up");
          wheelAccumulator = 0;
        }
      }, { passive: false });

      // Touch swipe support
      let touchStartY = 0;
      container.addEventListener("touchstart", (e) => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      container.addEventListener("touchend", (e) => {
        const deltaY = touchStartY - e.changedTouches[0].clientY;
        if (Math.abs(deltaY) > 50 && !isSliderAnimating) {
          handleSlideChange(deltaY > 0 ? "down" : "up");
        }
      });

      document.addEventListener("DOMContentLoaded", initializeSlider);
    </script>
  </body>
</html>
