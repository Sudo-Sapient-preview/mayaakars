<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayaakars Services Stack - Image Focus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Geist:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --fg: #E3E4E0;
            --gold: #C49A3A;
            --line: rgba(255,255,255,0.15);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Geist', sans-serif;
            overflow-x: hidden;
            padding-bottom: 50vh;
        }

        .stack-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-inline: 2vw;
            padding-top: 4vh;
        }

        section {
            position: sticky;
            top: 10vh;
            width: min(1100px, 92vw);
            height: 75vh;
            margin-bottom: 30vh;
            border-radius: 24px;
            overflow: hidden; /* Clips the image */
            border: 1px solid var(--line);
            background: #000;
            transition: transform 0.2s linear;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.8);
        }

        .s1 { margin-top: 8vh; z-index: 1; }
        .s2 { z-index: 2; }
        .s3 { z-index: 3; }
        .s4 { z-index: 4; }

        /* The Image Layer */
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1), 
                        filter 0.6s ease;
            filter: brightness(0.8); /* Dimmer by default for classier look */
        }

        /* The Text Overlay */
        .card-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0); /* Transparent until hover */
            transition: background 0.5s ease;
            pointer-events: none; /* Allow hovering the image through the overlay */
            text-align: center;
            padding: 40px;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            color: var(--fg);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.2, 0, 0.2, 1);
            margin: 0;
        }

        .card-subtitle {
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0;
            transition: all 0.5s ease 0.1s;
        }

        /* Hover States */
        section:hover .card-img {
            filter: blur(8px) brightness(0.4);
            transform: scale(1.05);
        }

        section:hover .card-overlay {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px); /* Extra layer of soft blur */
        }

        section:hover .card-title,
        section:hover .card-subtitle {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Mobile Responsive ── */
        @media (max-width: 768px) {
            body {
                padding-bottom: 30vh;
            }

            section {
                height: 50vh;
                margin-bottom: 20vh;
                border-radius: 16px;
            }

            .card-overlay {
                padding: 24px;
            }

            /* Show text by default on touch devices */
            .card-title,
            .card-subtitle {
                opacity: 1;
                transform: translateY(0);
            }

            .card-img {
                filter: brightness(0.5);
            }

            .card-overlay {
                background: rgba(0, 0, 0, 0.2);
            }
        }

        @media (max-width: 480px) {
            section {
                height: 40vh;
                margin-bottom: 15vh;
                border-radius: 12px;
            }

            .stack-container {
                padding-top: 2vh;
            }

            .card-overlay {
                padding: 16px;
            }

            .card-subtitle {
                font-size: 10px;
                letter-spacing: 0.25em;
            }
        }

    </style>
</head>
<body>

    <div class="stack-container">
        <section class="s1">
            <img class="card-img" src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=1200" alt="Architecture">
            <div class="card-overlay">
                <p class="card-subtitle">Architecture</p>
                <h2 class="card-title">Structural Clarity</h2>
            </div>
        </section>

        <section class="s2">
            <img class="card-img" src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&q=80&w=1200" alt="Interiors">
            <div class="card-overlay">
                <p class="card-subtitle">Interior Design</p>
                <h2 class="card-title">Material Depth</h2>
            </div>
        </section>

        <section class="s3">
            <img class="card-img" src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&q=80&w=1200" alt="Visualization">
            <div class="card-overlay">
                <p class="card-subtitle">Visualization</p>
                <h2 class="card-title">3D Articulation</h2>
            </div>
        </section>

        <section class="s4">
            <img class="card-img" src="https://images.unsplash.com/photo-1513519247388-193ad51ae207?auto=format&fit=crop&q=80&w=1200" alt="Execution">
            <div class="card-overlay">
                <p class="card-subtitle">Execution</p>
                <h2 class="card-title">Crafted Delivery</h2>
            </div>
        </section>
    </div>

    <script>
        // Keeping the stacking scale logic from before
        window.addEventListener('scroll', () => {
            const sections = document.querySelectorAll('section');
            const stickyPoint = window.innerHeight * 0.1;

            sections.forEach((section) => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= stickyPoint + 2) {
                    const diff = stickyPoint - rect.top;
                    const scale = Math.max(0.92, 1 - (diff / 2500));
                    section.style.transform = `scale(${scale})`;
                } else {
                    section.style.transform = `scale(1)`;
                }
            });
        });
    </script>
</body>
</html>
